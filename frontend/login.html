<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodAtGate | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-utensils"></i>
            FoodAtGate
        </div>
    </header>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Welcome Back</h1>
                    <p>Sign in to your FoodAtGate account</p>
                </div>

                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="text" id="email" required placeholder="Enter your email">
                        <div class="input-icon"><i class="fa-regular fa-envelope"></i></div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="Enter your password">
                        <div class="input-icon" style="cursor: pointer; pointer-events: auto;" onclick="
                            const pwd = document.getElementById('password');
                            const icon = this.querySelector('i');
                            if (pwd.type === 'password') {
                                pwd.type = 'text';
                                icon.classList.remove('fa-eye');
                                icon.classList.add('fa-eye-slash');
                            } else {
                                pwd.type = 'password';
                                icon.classList.remove('fa-eye-slash');
                                icon.classList.add('fa-eye');
                            }
                        "><i class="fa-regular fa-eye"></i></div>
                    </div>

                    <button type="submit" class="auth-btn">Sign In</button>
                </form>

                <div class="auth-footer">
                    <p id="login-message"></p>
                    <p>Don't have an account? <a href="register.html" class="auth-link">Create Account</a></p>
                </div>
            </div>

            <div class="auth-info">
                <h2>Why Choose FoodAtGate?</h2>
                <ul>
                    <li>🚚 Collect food at your hostel gate</li>
                    <li>🍕 Wide variety of delicious meals</li>
                    <li>⚡ Order anytime, collect instantly</li>
                    <li>💰 Pay only when you collect</li>
                </ul>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 FoodAtGate</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
