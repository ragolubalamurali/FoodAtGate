<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodAtGate | Cart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-utensils"></i>
            FoodAtGate
        </div>
        <nav></nav>
    </header>

    <section class="cart">
        <h2>Your Cart</h2>
        <div id="cart-items">
            <!-- JS loads cart items here -->
        </div>

        <div class="cart-summary">
            <h3>Total: ₹<span id="cart-total">0</span></h3>
            <button id="place-order-btn" class="btn btn-orange">
                <i class="fa-solid fa-check-circle"></i> Place Order
            </button>
        </div>
    </section>

    <!-- Delivery Details Modal -->
    <div id="delivery-modal" class="modal-overlay" style="display: none;">
        <div class="modal-container">
            <div class="modal-header">
                <h2>📦 Delivery Details</h2>
                <p>Please provide your phone number and delivery address</p>
                <button class="modal-close-btn" id="modal-close-btn">&times;</button>
            </div>
            <form id="delivery-form" class="modal-form">
                <div class="form-group">
                    <label for="delivery-phone">📱 Phone Number</label>
                    <input type="tel" id="delivery-phone" required placeholder="Enter your phone number"
                        pattern="[0-9]{10}" title="Please enter a valid 10-digit phone number">
                </div>
                <div class="form-group">
                    <label for="delivery-address">📍 Delivery Address</label>
                    <textarea id="delivery-address" required placeholder="Enter your delivery address"
                        rows="3"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" id="modal-cancel-btn" class="btn btn-outline-modal">Cancel</button>
                    <button type="submit" class="btn btn-orange">
                        <i class="fa-solid fa-check-circle"></i> Confirm & Place Order
                    </button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>© 2026 FoodAtGate</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
