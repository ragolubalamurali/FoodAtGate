<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodAtGate | Register</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-utensils"></i>
            FoodAtGate
        </div>
    </header>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Join FoodAtGate</h1>
                    <p>Create your account to start ordering delicious food</p>
                </div>

                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" required placeholder="Enter your full name">
                        <div class="input-icon">📝</div>
                    </div>

                    <div class="form-group">
                        <label for="reg-email">Email Address</label>
                        <input type="email" id="reg-email" required placeholder="Enter your email">
                        <div class="input-icon">✉️</div>
                    </div>

                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required placeholder="Create a password">
                        <div class="input-icon">🔒</div>
                    </div>

                    <div class="form-group">
                        <label for="reg-confirm-password">Confirm Password</label>
                        <input type="password" id="reg-confirm-password" required placeholder="Confirm your password">
                        <div class="input-icon">🔐</div>
                    </div>

                    <button type="submit" class="auth-btn">Create Account</button>
                </form>

                <div class="auth-footer">
                    <p id="register-message"></p>
                    <p>Already have an account? <a href="login.html" class="auth-link">Sign In</a></p>
                </div>
            </div>

            <div class="auth-info">
                <h2>Welcome to FoodAtGate!</h2>
                <ul>
                    <li>🚚 Quick gate collection system</li>
                    <li>🍽️ Fresh, quality food</li>
                    <li>⚡ Fast and convenient ordering</li>
                    <li>🎓 Perfect for hostel life</li>
                </ul>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 FoodAtGate</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
